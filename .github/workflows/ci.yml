name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  ENVIRONMENT: test
  DATABASE_URL: postgresql+asyncpg://aidevconnect:aidevconnect@localhost:5432/aidevconnect
  SECRET_KEY: ci-test-secret-key
  MOCK_EMBEDDINGS: "true"
  MATCH_MIN_SIMILARITY: "0"
  CORS_ORIGINS: http://localhost:5173

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Ruff
        run: ruff check backend/app backend/tests backend/scripts

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aidevconnect
          POSTGRES_PASSWORD: aidevconnect
          POSTGRES_DB: aidevconnect
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aidevconnect -d aidevconnect"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Pytest
        working-directory: backend
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, lint, and build
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund
          npm run lint
          npm run build

  load-test:
    runs-on: ubuntu-latest
    needs: backend-test
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aidevconnect
          POSTGRES_PASSWORD: aidevconnect
          POSTGRES_DB: aidevconnect
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aidevconnect -d aidevconnect"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run migrations and seed
        working-directory: backend
        run: |
          alembic upgrade head
          python scripts/seed_load_test.py --projects 500

      - name: Start API
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done

      - name: Locust load test
        run: |
          mkdir -p loadtests/results
          locust -f loadtests/locustfile.py \
            --headless \
            -u 50 \
            -r 10 \
            -t 30s \
            --host http://localhost:8000 \
            --csv=loadtests/results/locust \
            --only-summary

      - name: Assert p95 under 200ms
        run: |
          python3 <<'PY'
          import csv
          import sys

          target = "/api/v1/projects/[id]/matches"
          with open("loadtests/results/locust_stats.csv") as f:
              rows = list(csv.DictReader(f))

          row = next((r for r in rows if r.get("Name") == target), None)
          if not row:
              print(f"Missing stats for {target}")
              sys.exit(1)

          p95 = float(row["95%"])
          avg = float(row["Average Response Time"])
          print(f"Matching endpoint — avg: {avg:.1f}ms  p95: {p95:.1f}ms")

          if p95 > 200:
              print(f"FAIL: p95 {p95:.1f}ms exceeds 200ms")
              sys.exit(1)

          print(f"PASS: p95 {p95:.1f}ms is under 200ms")
          PY

      - name: Upload Locust results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-results
          path: loadtests/results/

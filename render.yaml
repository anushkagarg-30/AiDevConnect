# Render Blueprint — https://render.com/docs/blueprint-spec
# Production DB: use Neon (free, permanent pgvector). See docs/DATABASE.md
# Migrations + demo seed run automatically on API startup.

services:
  - type: web
    name: aidevconnect-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    dockerCommand: sh scripts/start.sh
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: MOCK_EMBEDDINGS
        value: "false"
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: GOOGLE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: aidevconnect-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: aidevconnect-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: aidevconnect-api
          envVarKey: RENDER_EXTERNAL_URL

# No Render Postgres — use Neon pgvector (docs/DATABASE.md). Paste DATABASE_URL when deploying.
